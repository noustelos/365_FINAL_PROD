[build]
  publish = "."

# Canonical URL handling and clean routing
[[redirects]]
  from = "https://www.365orthodoxy.com/*"
  to = "https://365orthodoxy.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301

[[redirects]]
  from = "/en"
  to = "/en.html"
  status = 301

[[redirects]]
  from = "/en/"
  to = "/en.html"
  status = 301

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 301

[[redirects]]
  from = "/privacy/"
  to = "/privacy.html"
  status = 301

[[redirects]]
  from = "/privacy-en"
  to = "/privacy-en.html"
  status = 301

[[redirects]]
  from = "/privacy-en/"
  to = "/privacy-en.html"
  status = 301

# Security headers for all routes
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# Keep HTML fresh
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Static assets can be cached aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Prevent indexing of thank-you page even if linked
[[headers]]
  for = "/success.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
